services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rule_engine
      POSTGRES_PASSWORD: rule_engine
      POSTGRES_DB: rule_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrate/r0001:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rule_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
