services:
  postgres:
    image: postgres:17-alpine
    command: >
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
    environment:
      POSTGRES_USER: rule_engine
      POSTGRES_PASSWORD: rule_engine
      POSTGRES_DB: rule_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrate/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rule_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-replica-1:
    image: redis:7-alpine
    command: redis-server --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-replica-2:
    image: redis:7-alpine
    command: redis-server --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-sentinel-1:
    image: redis:7-alpine
    ports:
      - "26379:26379"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "port 26379" > /tmp/sentinel.conf
        echo "sentinel resolve-hostnames yes" >> /tmp/sentinel.conf
        echo "sentinel monitor mymaster redis-master 6379 2" >> /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-sentinel-2:
    image: redis:7-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "port 26379" > /tmp/sentinel.conf
        echo "sentinel resolve-hostnames yes" >> /tmp/sentinel.conf
        echo "sentinel monitor mymaster redis-master 6379 2" >> /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-sentinel-3:
    image: redis:7-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "port 26379" > /tmp/sentinel.conf
        echo "sentinel resolve-hostnames yes" >> /tmp/sentinel.conf
        echo "sentinel monitor mymaster redis-master 6379 2" >> /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      DB_HOST: postgres
      REDIS_MASTER_NAME: "mymaster"
      REDIS_SENTINEL_ADDRS: "redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379"
      KAFKA_BROKERS: "kafka:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/rule-engine-worker"]
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      DB_HOST: postgres
      REDIS_MASTER_NAME: "mymaster"
      REDIS_SENTINEL_ADDRS: "redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379"
      KAFKA_BROKERS: "kafka:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
