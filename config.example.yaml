app:
  addr: ":8080"

worker:
  pool_size: 4

db:
  host: "localhost"
  user: "rule_engine"
  password: "rule_engine"
  dbname: "rule_engine"
  port: 5432
  sslmode: "disable"
  timezone: "UTC"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

kafka:
  brokers: "localhost:9092"
  consumer_group: "rule-engine-worker"
  topics:
    events: "rule-engine-events"
    results: "rule-engine-results"

log:
  level: "info"
